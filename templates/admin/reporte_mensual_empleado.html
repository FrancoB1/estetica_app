{% extends "admin/change_list.html" %}

{% block content %}
<h1>Reporte mensual por empleado</h1>

<form method="get" style="margin-bottom:20px;">
    Año:
    <input type="number" name="anio" value="{{ anio }}" style="width:80px;">
    Mes:
    <input type="number" name="mes" value="{{ mes }}" style="width:60px;">
    <button class="button">Ver</button>
</form>

<table class="adminlist">
    <thead>
        <tr>
            <th>Empleado</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row.empleado__usuario__username }}</td>
            <td>$ {{ row.total|floatformat:2 }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">Sin datos para este período</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
